  - url: https://consumerdatastandardsaustralia.github.io/standards/#introduction
    type: APIReference
  - url: openapi/defence-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: 'CONSUMER-AUTHORIZED Consumer Data Right (CDR) Accounts and Balances
    API under the shared DSB Consumer Data Standards Banking API v1.36.0. Covers Get
    Accounts (/banking/accounts), Get Bulk Balances (/banking/accounts/balances),
    Get Account Balance (/banking/accounts/{accountId}/balance) and Get Account Detail
    (/banking/accounts/{accountId}). Unlike Product Reference Data, these endpoints
    require an Accredited Data Recipient (ADR) and the customer''s consent via the
    OAuth2/OIDC FAPI CDR authorization model — they are not open/unauthenticated.'
