apis:
- aid: defence-bank:defence-bank-cdr-product-reference-data-api
  name: Defence Bank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking Products
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.defencebank.com.au/tools-and-advice/open-banking/
  baseURL: https://product.defencebank.com.au/cds-au/v1
  properties:
  - url: https://www.defencebank.com.au/tools-and-advice/open-banking/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#introduction
    type: APIReference
  - url: openapi/defence-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right (CDR) Product Reference Data
    API exposing Defence Bank's retail and business banking products under the standard
    Consumer Data Standards (CDS) path /cds-au/v1/banking/products and /cds-au/v1/banking/products/{productId}.
    Confirmed live at HTTP 200 with x-v 4 returning a data.products array (52 products
    across transaction accounts, savings accounts, term deposits, credit cards, home
    loans, offset accounts, overdrafts, and personal loans).
