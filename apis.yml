    type: APIReference
  - url: openapi/defence-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: 'PUBLIC / unauthenticated Consumer Data Right (CDR) Product Reference
    Data API exposing Defence Bank''s retail and business banking products under the
    shared DSB Consumer Data Standards (CDS) Banking API v1.36.0 — paths /cds-au/v1/banking/products
    and /cds-au/v1/banking/products/{productId}. No consumer consent or CDR ADR accreditation
    is required. Confirmed live at HTTP 200 with x-v 4 (probed 2026-07-21) returning
    a data.products array (52 products across transaction accounts, savings accounts,
    term deposits, credit cards, home loans, offset accounts, overdrafts, and personal
    loans).'
- aid: defence-bank:defence-bank-cdr-accounts-balances-api
  name: Defence Bank CDR Accounts & Balances API
  tags:
  - CDR
