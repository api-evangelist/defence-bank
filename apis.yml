    and Get Payee Detail (/banking/payees/{payeeId}), returning the member''s saved
    domestic, biller and international payees. Access requires an Accredited Data Recipient
    (ADR) and the customer''s consent via the OAuth2/OIDC FAPI CDR authorization model
    — these endpoints are not open/unauthenticated.'
