    (/banking/accounts/{accountId}/transactions/{transactionId}), supporting date,
    amount and text filtering. Access requires an Accredited Data Recipient (ADR)
    and the customer''s consent via the OAuth2/OIDC FAPI CDR authorization model —
    these endpoints are not open/unauthenticated.'
