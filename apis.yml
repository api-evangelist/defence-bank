name: Defence Bank
kind: company
description: Defence Bank Limited is an Australian customer-owned (mutual) bank established
  in 1975 and headquartered in Melbourne, serving current and former Australian Defence
  Force personnel, Department of Defence employees, and their families as well as the
  broader community. As an APRA-regulated Authorised Deposit-taking Institution (ADI),
  it exists to return value to members rather than external shareholders. Under Australia's
  Consumer Data Right (CDR / Open Banking), Defence Bank operates as a data holder and
  exposes a public, unauthenticated Product Reference Data (PRD) API conforming to the
  DSB Consumer Data Standards; deeper consumer-data sharing requires an accredited data
  recipient and the OAuth2/OIDC FAPI CDR authorization model.
