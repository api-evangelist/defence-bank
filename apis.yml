    /banking/accounts/direct-debits) plus Get Scheduled Payments For Account and bulk
    Get Scheduled Payments (/banking/accounts/{accountId}/payments/scheduled, /banking/payments/scheduled).
    Access requires an Accredited Data Recipient (ADR) and the customer''s consent
    via the OAuth2/OIDC FAPI CDR authorization model — not open/unauthenticated.'
