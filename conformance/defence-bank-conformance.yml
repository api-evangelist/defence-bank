description: >-
  Defence Bank Limited is a registered Consumer Data Right (CDR) data holder under
  Australia's Competition and Consumer (Consumer Data Right) Rules, regulated by APRA
  as an Authorised Deposit-taking Institution (ADI). Its Product Reference Data (PRD)
  API conforms to the Data Standards Body (DSB) Consumer Data Standards for the banking
  sector. The authenticated consumer-data-sharing endpoints (accounts, balances,
  transactions, direct debits, scheduled payments, payees) additionally require the
  CDR FAPI security profile (OAuth2 / OIDC / MTLS) and are only accessible to
  Accredited Data Recipients (ADRs).
